[default]
gamedirs=C:\Games
verbose=0
keyboard_test=0
savedirs=0
preload_names=1
timers=0

[display]
; Adjust horizontal sync position to correct CRT image shift vs DOS text mode.
; Negative values shift the image right, positive shifts left.
; Each unit is approximately 8 pixels. Start with -6 and tune to taste.
hsync_shift=-6

[sound]
volume=128